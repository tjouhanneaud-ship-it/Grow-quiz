<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GROW Quiz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
body { background: #fff; color: #1d1d1f; font-family: -apple-system, 'Helvetica Neue', sans-serif; min-height: 100vh; }
.wrap { max-width: 560px; margin: 0 auto; padding: 0 20px 60px; }

/* screens */
.screen { display: none; }
.screen.on { display: block; animation: up .25s ease; }
@keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* header */
.hd { padding: 48px 0 24px; text-align: center; }
.logo { display:inline-flex; align-items:center; justify-content:center; width:52px; height:52px; background:#1a7f4e; border-radius:13px; margin-bottom:14px; }
.logo svg { width:26px; height:26px; fill:white; }
.hd h1 { font-size:26px; font-weight:700; letter-spacing:-.5px; margin-bottom:5px; }
.hd p  { font-size:15px; color:#6e6e73; }
.pill { display:inline-flex; align-items:center; gap:5px; background:#e8f5ee; color:#1a7f4e; font-size:13px; font-weight:600; padding:5px 13px; border-radius:100px; margin-top:10px; }

/* progress */
.prog-wrap { margin-bottom: 16px; }
.prog-meta { display:flex; justify-content:space-between; font-size:13px; color:#6e6e73; font-weight:500; margin-bottom:7px; }
.prog-track { height:3px; background:#e8e8ed; border-radius:2px; overflow:hidden; }
.prog-fill  { height:100%; background:#1a7f4e; border-radius:2px; transition:width .35s ease; }

/* question */
.qcard { background:#f5f5f7; border-radius:14px; padding:22px; margin-bottom:10px; }
.qlabel { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:#1a7f4e; margin-bottom:9px; }
.qtext  { font-size:17px; font-weight:600; line-height:1.45; letter-spacing:-.2px; }

/* options */
.opts { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.opt { display:flex; align-items:center; gap:12px; background:#f5f5f7; border:1.5px solid #d2d2d7; border-radius:10px; padding:13px 16px; font-family:inherit; font-size:15px; font-weight:400; color:#1d1d1f; text-align:left; cursor:pointer; width:100%; transition:all .15s; }
.opt:hover:not(:disabled) { background:white; border-color:#1a7f4e; box-shadow:0 0 0 3px rgba(26,127,78,.08); }
.opt.cor { background:#e8f5ee; border-color:#34c759; color:#1a7f4e; font-weight:500; }
.opt.wrg { background:#fff1f0; border-color:#ff3b30; color:#ff3b30; }
.opt:disabled { cursor:default; }
.opt-circle { width:25px; height:25px; border-radius:50%; background:white; border:1.5px solid #d2d2d7; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:#6e6e73; flex-shrink:0; }
.opt.cor .opt-circle { background:#34c759; border-color:#34c759; color:white; }
.opt.wrg .opt-circle { background:#ff3b30; border-color:#ff3b30; color:white; }

/* feedback */
.fb { border-radius:10px; padding:11px 14px; font-size:13px; line-height:1.5; display:none; align-items:flex-start; gap:8px; margin-bottom:10px; }
.fb.on  { display:flex; animation:up .18s ease; }
.fb.yes { background:#e8f5ee; color:#1a7f4e; }
.fb.no  { background:#fff1f0; color:#c0392b; }
.fbi { font-size:14px; flex-shrink:0; margin-top:1px; }

/* next button */
.btn-next { display:none; width:100%; background:#1a7f4e; color:white; border:none; padding:15px; border-radius:10px; font-family:inherit; font-size:15px; font-weight:600; cursor:pointer; margin-bottom:6px; transition:background .15s; }
.btn-next:hover { background:#156b41; }
.btn-next.on { display:block; animation:up .18s ease; }

/* results */
.result-box { text-align:center; background:#f5f5f7; border-radius:14px; padding:36px 20px 28px; margin-bottom:12px; }
.donut-wrap { width:110px; height:110px; margin:0 auto 18px; position:relative; }
.donut-wrap svg { width:110px; height:110px; transform:rotate(-90deg); }
.d-bg  { fill:none; stroke:#e8e8ed; stroke-width:7; }
.d-fill{ fill:none; stroke-width:7; stroke-linecap:round; transition:stroke-dasharray .8s ease; }
.d-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.d-num  { font-size:26px; font-weight:700; letter-spacing:-1px; line-height:1; }
.d-den  { font-size:11px; color:#6e6e73; font-weight:500; margin-top:2px; }
.result-box h2 { font-size:20px; font-weight:700; letter-spacing:-.3px; margin-bottom:6px; }
.result-box p  { font-size:14px; color:#6e6e73; line-height:1.5; }

.raffle { background:#e8f5ee; border:1.5px solid rgba(26,127,78,.2); border-radius:14px; padding:18px 20px; margin-bottom:12px; display:none; }
.raffle h3 { font-size:14px; font-weight:600; color:#1a7f4e; margin-bottom:3px; }
.raffle p  { font-size:13px; color:#6e6e73; line-height:1.4; }

/* breakdown */
.bd { background:#f5f5f7; border-radius:14px; overflow:hidden; margin-top:12px; }
.bdh { padding:12px 16px; font-size:11px; font-weight:600; color:#6e6e73; text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid #d2d2d7; }
.bdr { display:flex; align-items:center; gap:11px; padding:11px 16px; border-bottom:1px solid #d2d2d7; font-size:13px; }
.bdr:last-child { border-bottom:none; }
.bdr1 { font-size:13px; flex-shrink:0; }
.bdr2 { font-size:11px; color:#aeaeb2; font-weight:500; white-space:nowrap; }
.bdr3 { flex:1; color:#6e6e73; }

/* restart */
.btn-restart { display:block; width:100%; background:#f5f5f7; color:#1d1d1f; border:1.5px solid #d2d2d7; padding:14px; border-radius:10px; font-family:inherit; font-size:15px; font-weight:500; cursor:pointer; text-align:center; margin-top:8px; transition:all .15s; }
.btn-restart:hover { background:white; }
</style>
</head>
<body>
<div class="wrap">

<!-- START -->
<div class="screen on" id="s-start">
  <div class="hd">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 19.5c-.2.32.06.67.4.55C6.1 19.2 8 17 8 17s0 2-1 4c4 0 9-4 9-9 0-1-.5-3-1-4 1 1 1 3 1 4 1-1 2-3 2-5 0-3-2-7-2-7z"/></svg></div>
    <h1>GROW Quiz</h1>
    <p>10 questions based on the video</p>
    <div class="pill">🎟 Get 9 or 10 right = £50 draw entry</div>
  </div>
  <button class="btn-next on" onclick="startQuiz()">Start quiz</button>
</div>

<!-- QUIZ -->
<div class="screen" id="s-quiz">
  <div style="padding-top:28px">
    <div class="prog-wrap">
      <div class="prog-meta"><span id="qlabel">Question 1 of 10</span><span id="qcor">0 correct</span></div>
      <div class="prog-track"><div class="prog-fill" id="pbar" style="width:10%"></div></div>
    </div>
    <div class="qcard" id="qcard"></div>
    <div class="opts" id="qopts"></div>
    <div class="fb" id="qfb"></div>
    <button class="btn-next" id="qnext" onclick="nextQ()">Continue</button>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="s-results">
  <div style="padding-top:28px">
    <div class="result-box">
      <div class="donut-wrap">
        <svg viewBox="0 0 110 110"><circle class="d-bg" cx="55" cy="55" r="46"/><circle class="d-fill" id="donut" cx="55" cy="55" r="46" stroke="#34c759" stroke-dasharray="0 289"/></svg>
        <div class="d-inner"><div class="d-num" id="rscore">0</div><div class="d-den">out of 10</div></div>
      </div>
      <h2 id="rhead"></h2>
      <p id="rsub"></p>
    </div>
    <div class="raffle" id="raffle">
      <h3>🎟 You qualify for the £50 draw</h3>
      <p>9 or more correct — you're entered. Good luck.</p>
    </div>
    <div class="bd"><div class="bdh">Your answers</div><div id="bdlist"></div></div>
    <button class="btn-restart" onclick="startQuiz()">Try again</button>
  </div>
</div>

</div>
<script>
var QS=[
  {q:"How long does GROW take to turn barley seeds into fresh livestock feed?",o:["24 hours","7 days","30 days","One full season"],c:1,f:"7 days — seeds in, fresh feed out the other end, every single day of the year."},
  {q:"What type of farming system does GROW use to grow feed indoors?",o:["Aquaponic","Aeroponic","Hydroponic","Vertical soil farming"],c:2,f:"Hydroponic — no soil needed, just water and light. That's how it achieves 95% less water usage."},
  {q:"How much can UK farmers spend on winter feed supplements each year?",o:["£500–£1,000","£1,500–£3,000","£3,600–£8,400","£15,000+"],c:2,f:"£3,600 to £8,400 — every year, before spring even arrives."},
  {q:"What is GROW's standout tech feature no competitor at this price offers?",o:["Voice-controlled irrigation","AI-powered mould detection","Solar-powered LED lights","Automated seed sorting"],c:1,f:"AI mould detection — a camera checks the trays every hour and sends an instant alert to your phone."},
  {q:"How often does the camera scan the trays for problems?",o:["Once a day","Every 6 hours","Every hour","Every 10 minutes"],c:2,f:"Every hour — continuous monitoring so issues are caught before they spread."},
  {q:"How long is the full commercial GROW chamber?",o:["5 metres","10 metres","15 metres","20 metres"],c:2,f:"15 metres — big enough to produce fodder for over 50 cattle, every single day."},
  {q:"How much less water does GROW use compared to traditional farming?",o:["40% less","65% less","80% less","95% less"],c:3,f:"95% less water. The system recirculates almost everything."},
  {q:"What is the entry price of a GROW system and how does it compare to competitors?",o:["£50,000 — the same","£90,000 — 30% cheaper","£120,000 — 10% more","£75,000 — 50% cheaper"],c:1,f:"£90,000 — 30% cheaper than the nearest competitor. And it's modular, so farmers can start small."},
  {q:"Where did the GROW team build and test their prototype?",o:["On a farm in Devon","In a local hardware shop","In the university makerspace","In a rented warehouse"],c:2,f:"The university makerspace at Exeter — 3D printed, USB powered, and yes, they grew barley in it."},
  {q:"How many small and medium farms across the UK is GROW targeting?",o:["5,000","45,000","120,000","500,000"],c:1,f:"45,000 farms — in a market worth £378 million a year."}
];

var cq=0, score=0, ans=[], done=false;

function show(id) {
  var ss=document.querySelectorAll('.screen');
  for(var i=0;i<ss.length;i++) ss[i].classList.remove('on');
  document.getElementById(id).classList.add('on');
}

function startQuiz() {
  cq=0; score=0; ans=[]; done=false;
  show('s-quiz');
  renderQ();
}

function renderQ() {
  done=false;
  var q=QS[cq], L=['A','B','C','D'];
  document.getElementById('qcard').innerHTML='<div class="qlabel">Question '+(cq+1)+' of '+QS.length+'</div><div class="qtext">'+q.q+'</div>';
  var h='';
  for(var i=0;i<q.o.length;i++) h+='<button class="opt" onclick="pick('+i+')" id="o'+i+'"><span class="opt-circle">'+L[i]+'</span>'+q.o[i]+'</button>';
  document.getElementById('qopts').innerHTML=h;
  var fb=document.getElementById('qfb'); fb.className='fb'; fb.innerHTML='';
  document.getElementById('qnext').className='btn-next';
  document.getElementById('pbar').style.width=((cq+1)/QS.length*100)+'%';
  document.getElementById('qlabel').textContent='Question '+(cq+1)+' of '+QS.length;
}

function pick(i) {
  if(done) return; done=true;
  var q=QS[cq]; ans.push({qi:cq,ch:i,c:q.c});
  for(var j=0;j<q.o.length;j++){
    var b=document.getElementById('o'+j); b.disabled=true;
    if(j===q.c) b.className='opt cor';
    else if(j===i) b.className='opt wrg';
  }
  var fb=document.getElementById('qfb');
  if(i===q.c){ score++; fb.innerHTML='<span class="fbi">✓</span><span>'+q.f+'</span>'; fb.className='fb yes on'; }
  else { fb.innerHTML='<span class="fbi">✕</span><span>'+q.f+'</span>'; fb.className='fb no on'; }
  document.getElementById('qcor').textContent=score+' correct';
  var nb=document.getElementById('qnext');
  nb.textContent=cq<QS.length-1?'Continue':'See results';
  nb.className='btn-next on';
}

function nextQ() { cq++; if(cq>=QS.length) finish(); else renderQ(); }

function finish() {
  show('s-results');
  var circ=2*Math.PI*46, d=document.getElementById('donut');
  d.style.strokeDasharray=(score/10*circ)+' '+circ;
  d.style.stroke=score>=9?'#34c759':score>=6?'#ff9f0a':'#ff3b30';
  document.getElementById('rscore').textContent=score;
  document.getElementById('rscore').style.color=score>=9?'#1a7f4e':score>=6?'#b87600':'#c0392b';
  var h,s;
  if(score===10){h="Perfect score.";s="10 out of 10. You were definitely paying attention.";}
  else if(score===9){h="So close to perfect.";s="9 out of 10 — that qualifies. You're in the draw.";}
  else if(score>=6){h="Good effort.";s=score+" out of 10 — the draw needs 9 or more. Better luck next time.";}
  else{h="Were you watching?";s=score+" out of 10. The video was two minutes long.";}
  document.getElementById('rhead').textContent=h;
  document.getElementById('rsub').textContent=s;
  document.getElementById('raffle').style.display=score>=9?'block':'none';
  var bl='';
  for(var i=0;i<ans.length;i++){
    var a=ans[i],q=QS[a.qi],ok=a.ch===a.c;
    bl+='<div class="bdr"><span class="bdr1">'+(ok?'✓':'✕')+'</span><span class="bdr2">Q'+(i+1)+'</span><span class="bdr3">'+q.o[a.c]+'</span></div>';
  }
  document.getElementById('bdlist').innerHTML=bl;
}
</script>
</body>
</html>
